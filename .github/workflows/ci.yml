name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Pester Tests
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Pester 5.x
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester

      - name: Run tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: test-results.xml

  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run analyzer (non-blocking)
        shell: pwsh
        continue-on-error: true
        run: |
          # Reglas excluidas para evitar falsos positivos comunes en scripts interactivos de consola:
          # - PSUseShouldProcessForStateChangingFunctions: scripts interactivos piden confirmacion manualmente
          # - PSAvoidUsingWriteHost: necesitamos Write-Host para UI con colores
          # - PSUseApprovedVerbs: algunas funciones usan verbos mas intuitivos (Apply-*, Fix-*, Play-*)
          # - PSAvoidGlobalVars: usamos $Global:GF para estado compartido entre modulos (intencional)
          # - PSAvoidUsingInvokeExpression: no aplicable aqui
          # - PSUseDeclaredVarsMoreThanAssignments: falsos positivos con scopes
          # - PSReviewUnusedParameter: param($Game) no siempre se usa en tweaks stub

          $excludedRules = @(
            'PSUseShouldProcessForStateChangingFunctions',
            'PSAvoidUsingWriteHost',
            'PSUseApprovedVerbs',
            'PSAvoidGlobalVars',
            'PSAvoidUsingInvokeExpression',
            'PSUseDeclaredVarsMoreThanAssignments',
            'PSReviewUnusedParameter',
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingConvertToSecureStringWithPlainText',
            'PSUseSingularNouns',
            'PSPossibleIncorrectComparisonWithNull',
            'PSUseOutputTypeCorrectly'
          )

          $results = Invoke-ScriptAnalyzer -Path . -Recurse `
            -ExcludeRule $excludedRules `
            -Severity Error

          if ($results) {
            Write-Host "Errores criticos encontrados:" -ForegroundColor Yellow
            $results | Format-Table -AutoSize
            Write-Host "::warning::Linter encontro $($results.Count) errores (no bloquea el build)"
          } else {
            Write-Host "Sin errores criticos" -ForegroundColor Green
          }
